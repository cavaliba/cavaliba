version: '3.0'

# networks:
#     default:
#       name: sirene
      
services:

  sirene_app:
    image: localhost:5000/sirene_app:0.23
    container_name: sirene_app
    restart: always
    #command: python manage.py runserver 0.0.0.0:8001
    #command: gunicorn core.wsgi:application --bind 0.0.0.0:8001 --log-level debug
    # >> entrypoint.sh 
    command: /docker-entrypoint.sh
    volumes:
      - ./sms/:/data/sms
      - ./mail/:/data/mail
      - ./export/:/data/export
      - ./import/:/data/import
      - ./web/logo:/logo
      - ./web/templates:/app/templates2
      - static_volume:/static_collect
    ports:
      - "127.0.0.1:8001:8001"
    expose:
      - 8001
    env_file:
      - ./env
    depends_on:
      - sirene_db

  sirene_celery:
    image: localhost:5000/sirene_app:0.23
    container_name: sirene_celery
    restart: always
    #command: python manage.py runserver 0.0.0.0:8000
    working_dir: /app
    #override entrypoint 
    command: celery --workdir /app -A core worker --log-level info --workers=4
    volumes:
      - ./web/logo:/logo
      - ./web/templates:/app/templates2    
      - ./sms/:/data/sms
      - ./mail/:/data/mail
      - ./export/:/data/export
      - ./import/:/data/import      
      - static_volume:/static_collect
    env_file:
      - ./env
    depends_on:
      - sirene_app
      - sirene_redis
      - sirene_db

  sirene_nginx:
    image: nginx:latest
    #image: localhost:5000/sirene_nginx:0.4
    container_name: sirene_nginx
    restart: always
    volumes:
      - ./conf/nginx_oauth2.conf:/etc/nginx/conf.d/default.conf:ro
      - ./log/nginx/:/var/log/nginx/
      - ./web/logo:/logo
      - ./web/templates:/app/templates2
      - static_volume:/static_collect
    ports:
      - "127.0.0.1:8000:80"
      #- 443:443
    env_file:
      - ./env
    depends_on:
      - sirene_oa2p
      - sirene_app


  sirene_oa2p:
    image: bitnami/oauth2-proxy:7.4.0
    #image: sirene.cavaliba.com/sirene_oauth2proxy
    container_name: sirene_oa2p
    restart: always
    command:
       - --config=/etc/oa2p.cfg
       - --cookie-expire=0h45m0s
    volumes:
      - ./conf/oa2p_okta.cfg:/etc/oa2p.cfg:ro
    env_file:
      - ./env
    depends_on:
      - sirene_redis


  sirene_db:
    image: mariadb:10.10
    container_name: sirene_db
    restart: always
    volumes:
      - ./db:/var/lib/mysql
      - ./conf/mariadb.cnf:/etc/mysql/mariadb.conf.d/99_sirene.cnf:ro
    expose:
      - 3306
    env_file:
      - ./env

  sirene_redis:
    image: redis:7.0.2-alpine3.16
    container_name: sirene_redis
    restart: always
    env_file:
      - ./env
    expose:
      - 6379

volumes:
  static_volume:
