# -----------------------------------
# DEV - no oauth2proxy & IDP
# basic NGINX authentication
# ------------------------------------

version: '3.0'

# networks:
#     default:
#       name: sirene

services:


  sirene_nginx:
    image: nginx:latest
    container_name: sirene_nginx
    volumes:
      - ./conf/nginx_sirene.conf:/etc/nginx/conf.d/default.conf
      - ./conf/htpasswd:/etc/nginx/htpasswd
      - ./log/nginx/:/var/log/nginx/
      - ./web/logo:/logo
      - static_volume:/static_collect
    ports:
      - 8000:80
      - 443:443
    env_file:
      - ./env
    depends_on:
      - sirene_app


  sirene_app:
    build: 
       context: .
       dockerfile: Dockerfile
    image: sirene_app
    container_name: sirene_app
    #command: python manage.py runserver 0.0.0.0:8001
    command: gunicorn core.wsgi:application --bind 0.0.0.0:8001 --log-level info --workers=4
    volumes:
      - ./django/:/app
      - ./sms/:/data/sms
      - ./mail/:/data/mail
      - ./import/:/data/import
      - ./export/:/data/export
      - ./web/logo:/logo
      - ./web/templates:/app/templates2
      - static_volume:/static_collect
    expose:
      - 8001
    env_file:
      - ./env
    depends_on:
      - sirene_db


  sirene_celery:
    build: 
       context: .
       dockerfile: Dockerfile    
    image: sirene_app
    container_name: sirene_celery
    #command: python manage.py runserver 0.0.0.0:8000
    working_dir: /app
    command: celery --workdir /app -A core worker --loglevel=info --concurrency 2
    volumes:
      - ./django/:/app
      - ./sms/:/data/sms
      - ./mail/:/data/mail
      - ./import/:/data/import
      - ./export/:/data/export
      - ./web/logo:/logo
      - ./web/templates:/app/templates2      
      - static_volume:/static_collect
    env_file:
      - ./env
    depends_on:
      - sirene_app
      - sirene_redis
      - sirene_db

  sirene_db:
    image: mariadb:10.10
    container_name: sirene_db
    volumes:
      - ./db:/var/lib/mysql
    expose:
      - 3306
    env_file:
      - ./env



  sirene_redis:
    image: redis:7.0.2-alpine3.16
    container_name: sirene_redis
    expose:
      - 6379
    env_file:
      - ./env


volumes:
  static_volume:
  cache: