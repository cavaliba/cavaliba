
# ==========================================
# oauth2_proxy nginx/authrequest for OKTA
# ==========================================

# remember : in auth_request oa2p is hidden from user and can be accessed only from nginx


# ------------------------
# oauth2_proxy server
# ------------------------
# if run in Docker, just has to be reachable by Nginx
http_address="0.0.0.0:4180"
skip_provider_button="true"
auth_logging = true
standard_logging = true
request_logging = true
show_debug_on_error = true
#logging_filename = "/var/log/oauth2-proxy.log"
session_store_type = "redis"
redis_connection_url = "redis://sirene_redis"
cookie_httponly=false
cookie_secure=false
cookie_refresh=true
cookie_samesite="lax"
#cookie_samesite="none"
cookie_csrf_expire="7m"
#cookie_csrf_per_request=true
#cookie_domains=["192.168.0.11","localhost","demo.cavaliba.com"] # Required so cookie can be read on all subdomains.
cookie_domains=["demo.cavaliba.com"] # Required so cookie can be read on all subdomains.
whitelist_domains=["demo.cavaliba.com"] # Required to allow redirection back to original requested target.
email_domains=["*"]
#email_domains="*"
set_xauthrequest=true
set_authorization_header=true
pass_authorization_header=true
pass_access_token=true

