#
# nginx.conf
#
# oauth2 proxy
# / public
# /static/ no auth
# /private/ with oauth
# /private/admin/ with auth

upstream sirene_app {
    server sirene_app:8001;
}


server {

    listen 80;
    server_name  localhost;
    #error_log /var/log/nginx.error.log debug;
    server_tokens off;
    
     # -----------------------
    # oauth2_proxy
    # -----------------------

    location /oauth2 {
        # BEWARE - DO NOT CONFIG internal !!    
        expires epoch;
        #internal; 
        proxy_pass       http://sirene_oa2p:4180;
        proxy_set_header Host                    $host;
        proxy_set_header X-Real-IP               $remote_addr;
        proxy_set_header X-Scheme                $scheme;
        proxy_set_header X-Auth-Request-Redirect $request_uri;
    }


    # BEWARE, no trailing / !!!
    location = /oauth2/auth {
        internal; 
        proxy_pass       http://sirene_oa2p:4180;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Scheme         $scheme;
        proxy_set_header X-Auth-Request-Redirect $request_uri;

        # nginx auth_request includes headers but not body
        proxy_set_header Content-Length   "";
        proxy_pass_request_body           off;
    }


    location = /oauth2/sign_out { 
        #internal; 
        # Sign-out mutates the session, only allow POST requests
        if ($request_method != POST) {
            return 405;
        }
        proxy_pass       http://sirene_oa2p:4180/;
        proxy_set_header Host                    $host;
        proxy_set_header X-Real-IP               $remote_addr;
        proxy_set_header X-Scheme                $scheme;
    }


    # -----------------------
    # no auth
    # -----------------------

    # static in DEV mode are also server by NGINX ; use collectstatic before
    
    location /static/ {
        alias /static_collect/;
    }

    location /logo/ {
        alias /logo/;
    }



    # -----------------------
    # app(s)
    # -----------------------


    location / {
        proxy_pass http://sirene_app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        real_ip_header X-Real-IP;
        #proxy_set_header X-Real-IP $remote_addr;
        proxy_redirect off;
        proxy_http_version 1.1;
    }


    location ~* ^\/([a-zA-Z0-9_]+)\/private\/ {
    #location /sirene/private/ {

        auth_request /oauth2/auth;
        error_page 401 = /oauth2/sign_in;
        auth_request_set $auth_cookie $upstream_http_set_cookie;
        add_header Set-Cookie $auth_cookie;
        auth_request_set $user   $upstream_http_x_auth_request_preferred_username;
        proxy_set_header X-User  $user;
        auth_request_set $email  $upstream_http_x_auth_request_email;
        proxy_set_header X-Email $email;
        auth_request_set $groups  $upstream_http_x_auth_request_groups;
        proxy_set_header X-Groups $groups;
        auth_request_set $auth_cookie_name_upstream_1 $upstream_cookie_auth_cookie_name_1;
        if ($auth_cookie ~* "(; .*)") {
           set $auth_cookie_name_0 $auth_cookie;
           set $auth_cookie_name_1 "auth_cookie_name_1=$auth_cookie_name_upstream_1$1";
        }
        if ($auth_cookie_name_upstream_1) {
           add_header Set-Cookie $auth_cookie_name_0;
           add_header Set-Cookie $auth_cookie_name_1;
        }

        # OIDC ID Token from oauth2_proxy
        auth_request_set $token2 $upstream_http_authorization;
        add_header Authorization $token2;
        proxy_set_header Authorization $token2;


        proxy_pass http://sirene_app;
        # BEWARE mandatory !!!!
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        real_ip_header X-Real-IP;
        #proxy_set_header X-Real-IP $remote_addr;
        proxy_redirect off;
        proxy_http_version 1.1;
    }




    # -----------------------
    # /private/   LEGACY
    # -----------------------

    # admin Django APP
    #
    # either at /admin/ , no OIDC/MFA , only admin auth.
    # or at /private/admin/ : MFA + app admin auth.
    #    location /admin/ {
    #        proxy_pass http://sirene_app;
    #        # mandatory !!!!
    #        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #        proxy_set_header Host $host;
    #        proxy_set_header X-Real-IP $remote_addr;
    #        proxy_redirect off;
    #    }


    location /private/ {

        auth_request /oauth2/auth;
        error_page 401 = /oauth2/sign_in;

        # if you enabled --cookie-refresh, this is needed for it to work with auth_request
        auth_request_set $auth_cookie $upstream_http_set_cookie;
        add_header Set-Cookie $auth_cookie;

        # Response
        #X-Auth-Request-Email: test@test.mma
        #X-Auth-Request-Groups: role:default-roles-myrealm,role:offline_access,role:uma_authorization,role:account:manage-account,role:account:manage-account-links,role:account:view-profile
        #X-Auth-Request-Preferred-Username: test


        # pass information via X-User and X-Email headers to backend,
        # requires running with --set-xauthrequest flag

        # user header
        #auth_request_set $user  $upstream_http_x_auth_request_user;
        auth_request_set $user   $upstream_http_x_auth_request_preferred_username;
        proxy_set_header X-User  $user;

        # email header
        auth_request_set $email  $upstream_http_x_auth_request_email;
        proxy_set_header X-Email $email;

        # groups
        auth_request_set $groups  $upstream_http_x_auth_request_groups;
        proxy_set_header X-Groups $groups;

        # if you enabled --pass-access-token, this will pass the token to the backend
        #auth_request_set $token  $upstream_http_x_auth_request_access_token;
        #proxy_set_header X-Access-Token $token;



        # When using the --set-authorization-header flag, some provider's cookies can exceed the 4kb
        # limit and so the OAuth2 Proxy splits these into multiple parts.
        # Nginx normally only copies the first `Set-Cookie` header from the auth_request to the response,
        # so if your cookies are larger than 4kb, you will need to extract additional cookies manually.
        auth_request_set $auth_cookie_name_upstream_1 $upstream_cookie_auth_cookie_name_1;
        # Extract the Cookie attributes from the first Set-Cookie header and append them
        # to the second part ($upstream_cookie_* variables only contain the raw cookie content)
        if ($auth_cookie ~* "(; .*)") {
           set $auth_cookie_name_0 $auth_cookie;
           set $auth_cookie_name_1 "auth_cookie_name_1=$auth_cookie_name_upstream_1$1";
        }
        # Send both Set-Cookie headers now if there was a second part
        if ($auth_cookie_name_upstream_1) {
           add_header Set-Cookie $auth_cookie_name_0;
           add_header Set-Cookie $auth_cookie_name_1;
        }

        # OIDC ID Token from oauth2_proxy
        auth_request_set $token2 $upstream_http_authorization;
        add_header Authorization $token2;
        proxy_set_header Authorization $token2;




        proxy_pass http://sirene_app;
        # BEWARE mandatory !!!!
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        real_ip_header X-Real-IP;
        #proxy_set_header X-Real-IP $remote_addr;
        proxy_redirect off;
        proxy_http_version 1.1;
    }






}
